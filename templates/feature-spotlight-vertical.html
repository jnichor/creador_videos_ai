<!DOCTYPE html>
<html lang="es-PE" style="background:#050a14;">
<head>
  <meta charset="UTF-8">
  <title>{{CLIENT_NAME}} — Marketing Video (Vertical 1080×1920, multi-page)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1080px; height: 1920px;
      overflow: hidden;
      background: #050a14;
      color: white;
      font-family: 'Inter', -apple-system, sans-serif;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    .slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.5s cubic-bezier(0.16,1,0.3,1);
      z-index: 10;
      background: #050a14;
    }
    .slide.active { opacity: 1; }

    /* =====================================================
       MULTI-PAGE TOUR — 2 dark-themed slides only (regla #17)
       ===================================================== */
    .demo-slide { overflow: hidden; align-items: stretch; justify-content: stretch; }
    .demo-frame-wrapper {
      position: relative;
      width: 1080px; height: 1920px;
      overflow: hidden;
      background: #050a14;
    }
    .demo-frame-wrapper iframe {
      width: 1080px; height: 6500px;
      border: 0;
      transform: translate3d(0, 0, 0) scale(1.0);
      transform-origin: top center;
      will-change: transform;
    }

    /* Feature spotlight — 3 zoom-and-hold spotlights on the SAME URL.
       Vertical-tuned: deeper translateY since 9:16 is taller, sections are
       further apart in pixels. */
    .demo-slide.active .spot-1 { animation: scroll-tour-spot1 7s ease-out forwards; }
    .demo-slide.active .spot-2 { animation: scroll-tour-spot2 7s ease-out forwards; }
    .demo-slide.active .spot-3 { animation: scroll-tour-spot3 7s ease-out forwards; }

    @keyframes scroll-tour-spot1 {
      0%   { transform: translate3d(0, 0, 0)        scale(1.05); }
      25%  { transform: translate3d(0, 0, 0)        scale(1.0);  }
      75%  { transform: translate3d(0, 0, 0)        scale(1.0);  }
      100% { transform: translate3d(0, -300px, 0)   scale(1.0);  }
    }

    @keyframes scroll-tour-spot2 {
      0%   { transform: translate3d(0, -1900px, 0)  scale(1.0);  }
      30%  { transform: translate3d(0, -1900px, 0)  scale(1.08); }
      80%  { transform: translate3d(0, -1900px, 0)  scale(1.08); }
      100% { transform: translate3d(0, -2050px, 0)  scale(1.05); }
    }

    @keyframes scroll-tour-spot3 {
      0%   { transform: translate3d(0, -3500px, 0)  scale(1.0);  }
      30%  { transform: translate3d(0, -3500px, 0)  scale(1.10); }
      85%  { transform: translate3d(0, -3500px, 0)  scale(1.10); }
      100% { transform: translate3d(0, -3650px, 0)  scale(1.05); }
    }

    .demo-frame-wrapper::after {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none; z-index: 2;
      background:
        radial-gradient(ellipse at center,
          transparent 60%,
          rgba(5,10,20,0.4) 100%),
        linear-gradient(to bottom,
          rgba(5,10,20,0.3) 0%, transparent 6%,
          transparent 94%, rgba(5,10,20,0.3) 100%);
    }

    /* =====================================================
       FAKE CURSOR — strong stroke (regla #18)
       ===================================================== */
    .fake-cursor {
      position: fixed;
      width: 36px; height: 52px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      filter:
        drop-shadow(0 0 8px rgba(0, 0, 0, 0.9))
        drop-shadow(0 4px 12px rgba(0, 0, 0, 0.7));
    }

    /* Click 1: home → productos at 9s. Pulse at 8.7s. Top-nav "Productos" link area. */
    .cursor-1 {
      left: 320px; top: 100px;
      animation: cursor-click 1s ease-out forwards 7.95s;
    }

    @keyframes cursor-click {
      0%   { opacity: 0; transform: translate(-120px, -100px) scale(1.2); }
      20%  { opacity: 1; transform: translate(-120px, -100px) scale(1.1); }
      60%  { opacity: 1; transform: translate(0, 0)             scale(1);   }
      72%  { opacity: 1; transform: translate(0, 0)             scale(0.78);}
      82%  { opacity: 1; transform: translate(0, 0)             scale(1);   }
      100% { opacity: 0; transform: translate(0, 0)             scale(1);   }
    }

    body.cta-active .fake-cursor { opacity: 0 !important; animation: none !important; }

    /* CTA */
    .cta-slide { flex-direction: column; gap: 3rem; padding: 0 4rem; }

    .cta-slide::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 9999px;
      background: rgba(0, 210, 255, 0.14);
      filter: blur(120px);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    .cta-logo-card {
      position: relative; z-index: 1;
      background: white;
      border-radius: 2rem;
      padding: 3rem 4rem;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05),
                  0 40px 100px rgba(0,210,255,0.22);
      opacity: 0;
      transform: scale(0.94);
      animation: cardIn 1.4s cubic-bezier(0.16,1,0.3,1) forwards 0.2s,
                 cardBreathe 4s ease-in-out infinite 1.6s;
    }
    .cta-logo-card img { width: 420px; height: auto; display: block; }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes cardBreathe {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.015); }
    }

    /* Eyebrow above the CTA tagline. Reads as a small section label.
       Vertical-tuned: font-size scales up vs square (0.85 → 1.1rem) for
       mobile readability. Lands 0.2s before the tagline. */
    .cta-eyebrow {
      position: relative; z-index: 1;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-top: 2rem;
      margin-bottom: -0.5rem;
      opacity: 0;
      animation: fadeUp 1.0s ease forwards 0.7s;
    }
    .cta-eyebrow::before { content: '— '; }
    .cta-eyebrow::after  { content: ' —'; }

    .cta-conversemos {
      position: relative; z-index: 1;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3.4rem; font-weight: 500;
      color: #00D2FF;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 0.9s;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cta-pill {
      position: relative; z-index: 1;
      display: inline-flex; align-items: center; gap: 1.2rem;
      background: #25D366; color: white;
      padding: 1.6rem 3.5rem;
      border-radius: 9999px;
      font-size: 2.2rem; font-weight: 600;
      letter-spacing: 0.01em;
      box-shadow: 0 0 60px rgba(37,211,102,0.5),
                  0 16px 40px rgba(0,0,0,0.4);
      opacity: 0;
      animation: fadeUp 1.2s ease forwards 1.4s;
    }
    .cta-pill svg { width: 46px; height: 46px; }

    /* =====================================================
       MOTION OVERLAYS / CALLOUTS (optional)
       See templates/README.md for usage. Variants: ring / box / stat.
       Per-instance positioning + timing via inline CSS variables:
         <div class="callout callout--stat"
              style="--x: 70%; --y: 35%; --start: 3.5s; --end: 5.5s;">
           +47% conversión
         </div>
       Hidden during the CTA outro.
       ===================================================== */
    .callout {
      position: fixed;
      left: var(--x, 50%);
      top: var(--y, 50%);
      z-index: 80;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%);
      animation:
        calloutFadeIn  0.35s ease-out forwards var(--start, 0s),
        calloutFadeOut 0.35s ease-in  forwards var(--end,   1s);
      will-change: transform, opacity;
    }

    @keyframes calloutFadeIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1);    }
    }
    @keyframes calloutFadeOut {
      from { opacity: 1; transform: translate(-50%, -50%) scale(1);    }
      to   { opacity: 0; transform: translate(-50%, -50%) scale(1.08); }
    }

    .callout--ring {
      width: 180px; height: 180px;
      border-radius: 9999px;
      border: 3.5px solid #00D2FF;
      box-shadow: 0 0 36px rgba(0, 210, 255, 0.55),
                  inset 0 0 20px rgba(0, 210, 255, 0.25);
    }
    .callout--ring::after {
      content: '';
      position: absolute; inset: -10px;
      border-radius: 9999px;
      border: 2.5px solid rgba(0, 210, 255, 0.7);
      animation: ringPulse 1.4s ease-out infinite;
    }
    @keyframes ringPulse {
      0%   { transform: scale(0.85); opacity: 0.9; }
      80%  { transform: scale(1.35); opacity: 0;   }
      100% { transform: scale(1.35); opacity: 0;   }
    }

    .callout--box {
      width: var(--w, 480px);
      height: var(--h, 280px);
      border: 3px solid #00D2FF;
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(0, 210, 255, 0.5);
      background: linear-gradient(180deg,
                  rgba(0,210,255,0.06) 0%,
                  rgba(0,210,255,0)    100%);
    }

    .callout--stat {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.8rem; font-weight: 700;
      color: white;
      letter-spacing: -0.01em;
      padding: 0.9rem 1.8rem;
      background: linear-gradient(135deg, #00D2FF 0%, #0099CC 100%);
      border-radius: 1rem;
      box-shadow: 0 0 48px rgba(0, 210, 255, 0.5),
                  0 16px 40px rgba(0, 0, 0, 0.45);
      white-space: nowrap;
    }
    .callout--stat::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 1.1rem;
      background: linear-gradient(135deg,
                  rgba(255,255,255,0.4) 0%,
                  rgba(255,255,255,0)   60%);
      z-index: -1;
      pointer-events: none;
    }

    body.cta-active .callout { opacity: 0 !important; animation: none !important; }

    /* Subtitles */
    .subtitles {
      position: fixed;
      bottom: 240px;
      left: 0; right: 0;
      height: 120px;
      z-index: 50;
      pointer-events: none;
    }

    .sub {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 2.1rem;
      color: white;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 14px rgba(0,0,0,0.85),
                   0 0 24px rgba(0,0,0,0.6);
      opacity: 0;
      padding: 0.55rem 1.5rem;
      background: rgba(5, 10, 20, 0.6);
      backdrop-filter: blur(14px);
      border-radius: 0.75rem;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Feature-spotlight timing — 6 subs, 2 per spotlight slide. */
    .sub-1  { animation: subFadeIn 0.18s ease-out forwards 0.30s,  subFadeOut 0.22s ease-in forwards 3.30s; }
    .sub-2  { animation: subFadeIn 0.18s ease-out forwards 3.50s,  subFadeOut 0.22s ease-in forwards 6.80s; }
    .sub-3  { animation: subFadeIn 0.18s ease-out forwards 7.20s,  subFadeOut 0.22s ease-in forwards 10.30s; }
    .sub-4  { animation: subFadeIn 0.18s ease-out forwards 10.50s, subFadeOut 0.22s ease-in forwards 13.80s; }
    .sub-5  { animation: subFadeIn 0.18s ease-out forwards 14.20s, subFadeOut 0.22s ease-in forwards 17.30s; }
    .sub-6  { animation: subFadeIn 0.18s ease-out forwards 17.50s, subFadeOut 0.22s ease-in forwards 20.80s; }

    @keyframes subFadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes subFadeOut {
      from { opacity: 1; transform: translateX(-50%) translateY(0); }
      to   { opacity: 0; transform: translateX(-50%) translateY(-4px); }
    }

    body.cta-active .subtitles { opacity: 0; transition: opacity 0.6s ease; }

    /* =====================================================
       CHANNEL VARIANTS — applied via <body class="channel-<name>">
       record_video.py --channel <tiktok|linkedin|youtube> injects the class
       before window.startSlideshow() runs. Re-placing subtitles per platform
       is the main lever; TikTok's native UI (likes/share/comments rail) covers
       the bottom 25% of the frame, so subtitles must move up for that channel.
       ===================================================== */

    /* TikTok / Reels / Shorts — bottom UI covers ~25% of the frame.
       Push subtitles to vertical center-upper. Slightly larger for thumb-scroll
       legibility. Move callouts up a bit too so they don't collide. */
    body.channel-tiktok .subtitles {
      top: 58%;
      bottom: auto;
      transform: translateY(-50%);
    }
    body.channel-tiktok .sub {
      font-size: 2.35rem;
      padding: 0.65rem 1.7rem;
    }

    /* LinkedIn — feed UI is minimal at the bottom, current placement
       (bottom: 240px) reads cleanly. No overrides needed — left as a
       hook for future tuning. */
    /* body.channel-linkedin { } */

    /* YouTube Shorts — bottom controls auto-hide on play. We can keep
       subtitles lower than the default LinkedIn placement for a more
       cinematic frame, since there's nothing covering them. */
    body.channel-youtube .subtitles {
      bottom: 140px;
    }

    /* =====================================================
       STYLE PACKS — applied via <body class="style-<name>">
       cinematic: default — no overrides.
       bold:      magenta + warm palette, punch transitions, pop subtitles.
       editorial: warm sepia + serif, letterbox bars, lower-third subtitle band.
       tech:      matrix-green + monospace, scanlines, glitch-step transitions.
       ===================================================== */

    /* ---------- BOLD PACK (D2C / lifestyle / retail) ---------- */
    body.style-bold .demo-frame-wrapper::after {
      background:
        radial-gradient(ellipse at center,
          transparent 55%,
          rgba(5,10,20,0.55) 100%),
        linear-gradient(to bottom,
          rgba(5,10,20,0.4) 0%, transparent 6%,
          transparent 94%, rgba(5,10,20,0.4) 100%);
    }

    body.style-bold .slide {
      transition: opacity 0.22s cubic-bezier(0.7,0,0.3,1),
                  transform 0.32s cubic-bezier(0.7,0,0.3,1);
      transform: translateX(48px);
    }
    body.style-bold .slide.active {
      transform: translateX(0);
    }

    body.style-bold .cta-slide::before {
      background: rgba(255, 59, 126, 0.20);
    }
    body.style-bold .cta-eyebrow { color: rgba(255, 59, 126, 0.7); }
    body.style-bold .cta-conversemos { color: #FF3B7E; }
    body.style-bold .cta-pill {
      background: linear-gradient(135deg, #FF3B7E 0%, #FF6B35 100%);
      box-shadow: 0 0 70px rgba(255, 59, 126, 0.5),
                  0 16px 40px rgba(0,0,0,0.4);
    }

    body.style-bold .sub {
      font-weight: 700;
      font-size: 2.45rem;
      padding: 0.7rem 1.9rem;
      background: linear-gradient(135deg,
                  rgba(255, 59, 126, 0.92) 0%,
                  rgba(255, 107, 53, 0.92) 100%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 30px rgba(255, 59, 126, 0.35);
      backdrop-filter: none;
      letter-spacing: 0;
    }
    body.style-bold .sub-1, body.style-bold .sub-2, body.style-bold .sub-3,
    body.style-bold .sub-4, body.style-bold .sub-5, body.style-bold .sub-6,
    body.style-bold .sub-7, body.style-bold .sub-8, body.style-bold .sub-9,
    body.style-bold .sub-10, body.style-bold .sub-11, body.style-bold .sub-12 {
      animation-name: subPop, subFadeOut;
    }
    @keyframes subPop {
      0%   { opacity: 0; transform: translateX(-50%) translateY(8px) scale(0.85); }
      55%  { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1.05); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1);    }
    }

    body.style-bold .callout--stat {
      background: linear-gradient(135deg, #FF3B7E 0%, #FF6B35 100%);
      box-shadow: 0 0 60px rgba(255, 59, 126, 0.55),
                  0 16px 40px rgba(0, 0, 0, 0.45);
      animation:
        calloutBurst   0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards var(--start, 0s),
        calloutFadeOut 0.35s ease-in forwards var(--end, 1s);
    }
    body.style-bold .callout--ring {
      border-color: #FF3B7E;
      box-shadow: 0 0 40px rgba(255, 59, 126, 0.55),
                  inset 0 0 22px rgba(255, 59, 126, 0.25);
    }
    body.style-bold .callout--ring::after { border-color: rgba(255, 59, 126, 0.7); }
    body.style-bold .callout--box {
      border-color: #FF3B7E;
      box-shadow: 0 0 44px rgba(255, 59, 126, 0.45);
      background: linear-gradient(180deg,
                  rgba(255,59,126,0.08) 0%,
                  rgba(255,59,126,0)    100%);
    }
    @keyframes calloutBurst {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0);    }
      60%  { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1);    }
    }

    /* ---------- EDITORIAL PACK (content brands / podcasts / thought leadership) ----------
       Vertical-tuned: letterbox is lighter (6% top/bottom) because 9:16 already
       crops a lot horizontally; subtitle font-size scales up for mobile legibility.
       Everything else mirrors the square editorial pack. */
    body.style-editorial .demo-frame-wrapper::after {
      background:
        linear-gradient(to bottom,
          rgba(20,12,4,1)  0%,    rgba(20,12,4,1)  6%,
          transparent       6.01%, transparent      93.99%,
          rgba(20,12,4,1)  94%,   rgba(20,12,4,1)  100%),
        radial-gradient(ellipse at center,
          rgba(255,210,140,0.04) 0%,
          transparent 55%,
          rgba(20,12,4,0.55) 100%);
    }
    body.style-editorial .slide {
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.style-editorial .cta-slide::before {
      background: rgba(212, 165, 116, 0.16);
    }
    body.style-editorial .cta-eyebrow {
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: rgba(212, 165, 116, 0.7);
    }
    body.style-editorial .cta-conversemos {
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-weight: 400;
      color: #D4A574;
      letter-spacing: 0.02em;
    }
    body.style-editorial .cta-pill {
      background: #D4A574;
      color: #1A1208;
      border-radius: 6px;
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      box-shadow: 0 8px 22px rgba(212, 165, 116, 0.35);
    }
    body.style-editorial .cta-pill svg { fill: #1A1208; }
    body.style-editorial .sub {
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 2.1rem;
      letter-spacing: 0.01em;
      padding: 0.6rem 2.5rem;
      background: linear-gradient(to right,
                  rgba(20,12,4,0) 0%,
                  rgba(20,12,4,0.8) 18%,
                  rgba(20,12,4,0.8) 82%,
                  rgba(20,12,4,0) 100%);
      border: none;
      border-radius: 0;
      color: #F4E7CF;
      backdrop-filter: none;
      box-shadow: none;
    }
    body.style-editorial .sub-1, body.style-editorial .sub-2, body.style-editorial .sub-3,
    body.style-editorial .sub-4, body.style-editorial .sub-5, body.style-editorial .sub-6,
    body.style-editorial .sub-7, body.style-editorial .sub-8, body.style-editorial .sub-9,
    body.style-editorial .sub-10, body.style-editorial .sub-11, body.style-editorial .sub-12 {
      animation-name: subEditorialIn, subFadeOut;
    }
    @keyframes subEditorialIn {
      0%   { opacity: 0; transform: translateX(-50%) translateY(6px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    body.style-editorial .callout--stat {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 600;
      background: rgba(212, 165, 116, 0.92);
      color: #1A1208;
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
      animation:
        calloutFadeIn  0.7s ease-out forwards var(--start, 0s),
        calloutFadeOut 0.5s ease-in  forwards var(--end,   1s);
    }
    body.style-editorial .callout--ring {
      border-color: #D4A574;
      box-shadow: 0 0 20px rgba(212, 165, 116, 0.35);
    }
    body.style-editorial .callout--ring::after { border-color: rgba(212, 165, 116, 0.55); }
    body.style-editorial .callout--box {
      border-color: rgba(212, 165, 116, 0.7);
      box-shadow: 0 0 22px rgba(212, 165, 116, 0.25);
      background: linear-gradient(180deg,
                  rgba(212,165,116,0.06) 0%,
                  rgba(212,165,116,0)    100%);
    }
    @keyframes calloutFadeIn {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.94); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1);    }
    }

    /* ---------- TECH PACK (AI / dev tools / cybersecurity) ----------
       Vertical-tuned: same palette and motion as square; subtitles +0.4rem
       for mobile readability. */
    body.style-tech .demo-frame-wrapper::after {
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(10,255,106,0.04) 0px,
          rgba(10,255,106,0.04) 1px,
          transparent           1px,
          transparent           3px),
        radial-gradient(ellipse at center,
          transparent 45%,
          rgba(0,8,4,0.7) 100%);
    }
    body.style-tech .slide {
      transition: opacity 0.18s cubic-bezier(0.9, 0, 0.1, 1),
                  filter   0.18s cubic-bezier(0.9, 0, 0.1, 1);
    }
    body.style-tech .slide:not(.active) {
      filter: hue-rotate(20deg) saturate(1.4);
    }
    body.style-tech .cta-slide::before {
      background: rgba(10, 255, 106, 0.12);
    }
    body.style-tech .cta-eyebrow {
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      letter-spacing: 0.15em;
      color: rgba(10, 255, 106, 0.65);
    }
    body.style-tech .cta-eyebrow::before { content: '[ '; }
    body.style-tech .cta-eyebrow::after  { content: ' ]'; }

    body.style-tech .cta-conversemos {
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, 'Courier New', monospace;
      font-weight: 600;
      color: #0AFF6A;
      letter-spacing: 0;
      text-shadow: 0 0 14px rgba(10, 255, 106, 0.45);
    }
    body.style-tech .cta-conversemos::before { content: '> '; opacity: 0.7; }
    body.style-tech .cta-pill {
      background: transparent;
      color: #0AFF6A;
      border: 2px solid #0AFF6A;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      font-weight: 600;
      box-shadow: 0 0 28px rgba(10, 255, 106, 0.35),
                  inset 0 0 14px rgba(10, 255, 106, 0.12);
    }
    body.style-tech .cta-pill svg { fill: #0AFF6A; }
    body.style-tech .sub {
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, 'Courier New', monospace;
      font-weight: 500;
      font-size: 1.95rem;
      letter-spacing: 0;
      padding: 0.5rem 1.3rem;
      background: rgba(0, 8, 4, 0.85);
      border: 1px solid rgba(10, 255, 106, 0.55);
      border-radius: 2px;
      color: #0AFF6A;
      text-shadow: 0 0 6px rgba(10, 255, 106, 0.35);
      backdrop-filter: none;
      box-shadow: 0 0 18px rgba(10, 255, 106, 0.15);
    }
    body.style-tech .sub::before { content: '> '; opacity: 0.7; }
    body.style-tech .sub-1, body.style-tech .sub-2, body.style-tech .sub-3,
    body.style-tech .sub-4, body.style-tech .sub-5, body.style-tech .sub-6,
    body.style-tech .sub-7, body.style-tech .sub-8, body.style-tech .sub-9,
    body.style-tech .sub-10, body.style-tech .sub-11, body.style-tech .sub-12 {
      animation-name: subTechIn, subFadeOut;
    }
    @keyframes subTechIn {
      0%   { opacity: 0; transform: translateX(-50%) translateY(0); }
      18%  { opacity: 1; }
      26%  { opacity: 0.2; }
      40%  { opacity: 1; }
      48%  { opacity: 0.4; }
      100% { opacity: 1; }
    }
    body.style-tech .callout--stat {
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      font-weight: 600;
      background: rgba(0, 8, 4, 0.92);
      color: #0AFF6A;
      border: 2px solid #0AFF6A;
      box-shadow: 0 0 40px rgba(10, 255, 106, 0.45),
                  inset 0 0 16px rgba(10, 255, 106, 0.15);
      text-shadow: 0 0 10px rgba(10, 255, 106, 0.45);
    }
    body.style-tech .callout--ring {
      border-color: #0AFF6A;
      box-shadow: 0 0 30px rgba(10, 255, 106, 0.5),
                  inset 0 0 18px rgba(10, 255, 106, 0.2);
    }
    body.style-tech .callout--ring::after { border-color: rgba(10, 255, 106, 0.65); }
    body.style-tech .callout--box {
      border-color: #0AFF6A;
      box-shadow: 0 0 28px rgba(10, 255, 106, 0.4);
      background: linear-gradient(180deg,
                  rgba(10,255,106,0.06) 0%,
                  rgba(10,255,106,0)    100%);
    }
  </style>
</head>
<body>
  <!-- Feature spotlight — 3 zoom-and-hold spotlights on the SAME URL + CTA. -->

  <!-- 1. Spotlight #1 (0–7s) — hero / feature 1 -->
  <div class="slide demo-slide active" data-duration="7000">
    <div class="demo-frame-wrapper">
      <iframe class="page-1 spot-1" src="{{PAGE_URL}}" loading="eager" sandbox="allow-same-origin allow-scripts" onload="window.iframe1Loaded=true"></iframe>
    </div>
  </div>

  <!-- 2. Spotlight #2 (7–14s) — mid-page feature -->
  <div class="slide demo-slide" data-duration="7000">
    <div class="demo-frame-wrapper">
      <iframe class="page-2 spot-2" src="{{PAGE_URL}}" loading="eager" sandbox="allow-same-origin allow-scripts"></iframe>
    </div>
  </div>

  <!-- 3. Spotlight #3 (14–21s) — late-page feature -->
  <div class="slide demo-slide" data-duration="7000">
    <div class="demo-frame-wrapper">
      <iframe class="page-2 spot-3" src="{{PAGE_URL}}" loading="eager" sandbox="allow-same-origin allow-scripts"></iframe>
    </div>
  </div>

  <!-- 4. CTA (21–28s = 7s) -->
  <div class="slide cta-slide" data-duration="7000">
    <div class="cta-logo-card">
      <img src="{{LOGO_FILENAME}}" alt="{{CLIENT_NAME}}">
    </div>
    <div class="cta-eyebrow">CONTACTO</div>
    <div class="cta-conversemos">{{CTA_TAGLINE}}</div>
    <div class="cta-pill">
      <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.74.46 3.46 1.32 4.97L2 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.66-1.03-5.16-2.91-7.04A9.85 9.85 0 0012.04 2zm.01 1.67c2.2 0 4.26.86 5.82 2.42a8.225 8.225 0 012.41 5.83c0 4.54-3.7 8.23-8.24 8.23-1.48 0-2.93-.39-4.19-1.15l-.3-.17-3.12.82.83-3.04-.2-.32a8.188 8.188 0 01-1.26-4.38c.01-4.54 3.7-8.24 8.25-8.24zm-2.84 4.46c-.18 0-.45.07-.69.32-.24.25-.91.89-.91 2.18 0 1.29.93 2.53 1.06 2.71.13.18 1.81 2.88 4.46 3.93 2.21.87 2.66.7 3.14.66.48-.04 1.55-.63 1.77-1.24.22-.61.22-1.13.16-1.24-.06-.11-.24-.18-.5-.31-.27-.13-1.55-.77-1.79-.85-.24-.09-.42-.13-.6.13-.18.27-.69.85-.84 1.03-.16.18-.31.2-.58.07-.27-.13-1.13-.42-2.16-1.33-.8-.71-1.34-1.59-1.49-1.86-.16-.27-.02-.41.12-.55.12-.12.27-.31.41-.47.13-.16.18-.27.27-.45.09-.18.04-.34-.02-.47-.06-.13-.59-1.42-.81-1.93-.21-.51-.43-.44-.59-.45-.15-.01-.32-.01-.5-.01z"/>
      </svg>
      {{CTA_PHONE}}
    </div>
  </div>

  <svg class="fake-cursor cursor-1" viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,0 L0,28 L7,21 L11,30 L14,29 L10,20 L18,20 Z"
          fill="white" stroke="black" stroke-width="3" stroke-linejoin="round"/>
  </svg>

  <!--
    Motion overlays / callouts (OPTIONAL — uncomment + position per client).
    All callouts are hidden during the CTA slide.

    <div class="callout callout--ring"
         style="--x: 70%; --y: 42%; --start: 3.2s; --end: 5.2s;"></div>

    <div class="callout callout--box"
         style="--x: 50%; --y: 60%; --w: 560px; --h: 320px;
                --start: 4.0s; --end: 7.5s;"></div>

    <div class="callout callout--stat"
         style="--x: 76%; --y: 30%; --start: 12.5s; --end: 15.0s;">
      +47% conversión
    </div>
  -->

  <div class="subtitles">
    <div class="sub sub-1">Tu primera ventaja.</div>
    <div class="sub sub-2">Lo que cambia el juego.</div>
    <div class="sub sub-3">La segunda razón</div>
    <div class="sub sub-4">por la que volvés.</div>
    <div class="sub sub-5">Y la tercera.</div>
    <div class="sub sub-6">La que nadie más tiene.</div>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;

    function next() {
      current++;
      if (current < slides.length) {
        slides.forEach(s => s.classList.remove('active'));
        slides[current].classList.add('active');
        if (slides[current].classList.contains('cta-slide')) {
          document.body.classList.add('cta-active');
        }
        setTimeout(next, parseInt(slides[current].dataset.duration));
      }
    }

    document.documentElement.classList.add('slideshow-paused');
    const styleEl = document.createElement('style');
    styleEl.textContent =
      ".slideshow-paused .demo-slide.active .page-1," +
      ".slideshow-paused .demo-slide.active .page-2," +
      ".slideshow-paused .fake-cursor," +
      ".slideshow-paused .sub { animation-play-state: paused !important; }";
    document.head.appendChild(styleEl);

    /* Idempotent startSlideshow + visual sync marker — see square.html for full notes.
       6x6 magenta pixel in top-right corner for 2 frames at slideshow t=0.
       record_video.py uses the marker as the real trim offset. */
    window.startSlideshow = function() {
      if (window.__slideshowStarted) return;
      window.__slideshowStarted = true;

      const m = document.createElement('div');
      m.id = '__sync-marker';
      m.style.cssText =
        'position:fixed;top:0;right:0;width:6px;height:6px;' +
        'background:#FF00FF;z-index:99999;pointer-events:none;';
      document.body.appendChild(m);
      requestAnimationFrame(() => requestAnimationFrame(() => m.remove()));

      document.documentElement.classList.remove('slideshow-paused');
      setTimeout(next, parseInt(slides[0].dataset.duration));
    };

    setTimeout(function() {
      if (document.documentElement.classList.contains('slideshow-paused')) {
        window.startSlideshow();
      }
    }, 5000);
  </script>
</body>
</html>
